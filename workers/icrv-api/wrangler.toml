## workers/icrv-api/wrangler.toml
## icrv-api — Gateway Worker; registers all 4 Durable Object classes.

account_id = "1c07214c662a877a6d09d597d5f4a461"
name = "icrv-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
CF_ACCESS_TEAM_DOMAIN = "americanironadmin.cloudflareaccess.com"
CF_ACCESS_AUD         = "cc08483a7cec7b0b502d7816b85ac844f11ae6dc874e55e01ea677902deeadae"
ENVIRONMENT           = "production"
SENTRY_DSN            = ""   # set via: wrangler secret put SENTRY_DSN --name icrv-api

[[d1_databases]]
binding       = "DB"
database_name = "icrv-db"
database_id = "fdf24661-6675-4570-b1b7-f2b672cad4bf"

[[kv_namespaces]]
binding = "KV_CONFIG"
id      = "ab921928cea14fbe9756f9a67ae3c1d3"
[[kv_namespaces]]
binding = "KV_OAUTH"
id      = "5e605b3a83994ee5b78b084d6b561d0b"
[[kv_namespaces]]
binding = "KV_RATE"
id      = "daf3f5efc06346a1a383150ab1de37da"
[[kv_namespaces]]
binding = "KV_IDEMP"
id      = "878fe6fdfa844b9d96df8017ac39ee63"
[[kv_namespaces]]
binding = "KV_TRACK"
id      = "7926181a73194dd2a2e14307cb7d4a27"
# KV_REVOKED — JTI revocation list for /v1/auth/logout. TTL'd entries clean up
# automatically. Provision with: wrangler kv namespace create KV_REVOKED, then
# replace the placeholder id below with the returned id.
[[kv_namespaces]]
binding = "KV_REVOKED"
id      = "09db5d58b02948a4ad5d60536dfbab01"
# KV_JWKS — caches the Cloudflare Access JWKS bundle so authMiddleware doesn't
# fetch /cdn-cgi/access/certs on every request. 1-hour TTL.
[[kv_namespaces]]
binding = "KV_JWKS"
id      = "42576af6e50642f492fc1cc03c5f1e7b"

[[r2_buckets]]
binding     = "R2_MEDIA"
bucket_name = "icrv-media"
[[r2_buckets]]
binding     = "R2_UPLOADS"
bucket_name = "icrv-uploads"
[[r2_buckets]]
binding     = "R2_EXPORTS"
bucket_name = "icrv-exports"
[[r2_buckets]]
binding     = "R2_TRANSCRIPTS"
bucket_name = "icrv-transcripts"
[[r2_buckets]]
binding     = "R2_EVIDENCE"
bucket_name = "icrv-evidence"

[[queues.producers]]
queue   = "icrv-email-out"
binding = "Q_EMAIL_OUT"
[[queues.producers]]
queue   = "icrv-email-in"
binding = "Q_EMAIL_IN"
[[queues.producers]]
queue   = "icrv-wa-out"
binding = "Q_WA_OUT"
[[queues.producers]]
queue   = "icrv-wa-in"
binding = "Q_WA_IN"
[[queues.producers]]
queue   = "icrv-voice-postcall"
binding = "Q_VOICE_POSTCALL"
[[queues.producers]]
queue   = "icrv-agent-jobs"
binding = "Q_AGENT"
[[queues.producers]]
queue   = "icrv-imports"
binding = "Q_IMPORT"
[[queues.producers]]
queue   = "icrv-retry"
binding = "Q_RETRY"
[[queues.producers]]
queue   = "icrv-dlq"
binding = "Q_DLQ"

[[durable_objects.bindings]]
name       = "CAMPAIGN_DO"
class_name = "CampaignCoordinatorDO"
[[durable_objects.bindings]]
name       = "CONTACT_INBOX_DO"
class_name = "ContactInboxDO"
[[durable_objects.bindings]]
name       = "VOICE_SESSION_DO"
class_name = "VoiceSessionDO"
[[durable_objects.bindings]]
name       = "OAUTH_DO"
class_name = "OAuthRotatorDO"

# AgentSessionDO is owned by icrv-agent
[[durable_objects.bindings]]
name        = "AGENT_SESSION_DO"
class_name  = "AgentSessionDO"
script_name = "icrv-agent"

[[migrations]]
tag         = "v1"
new_sqlite_classes = ["CampaignCoordinatorDO", "ContactInboxDO", "VoiceSessionDO", "OAuthRotatorDO"]

[[services]]
binding = "AGENT"
service = "icrv-agent"

[[services]]
binding = "VOICE"
service = "icrv-voice"

# Secrets:
#   wrangler secret put MASTER_KEK            --name icrv-api
#   wrangler secret put JWT_SIGNING_KEY       --name icrv-api
#   wrangler secret put GOOGLE_CLIENT_ID      --name icrv-api
#   wrangler secret put GOOGLE_CLIENT_SECRET  --name icrv-api
